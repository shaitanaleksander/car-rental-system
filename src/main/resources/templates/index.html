<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <header>
        <h1>Car Rental System</h1>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </header>

    <div id="alert" class="alert" style="display:none;"></div>

    <!-- Car List -->
    <section>
        <h2>Available Cars</h2>
        <div class="filter-bar">
            <label for="type">Filter by type:</label>
            <select id="type">
                <option value="">All</option>
                <option th:each="t : ${carTypes}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>

        <table>
            <thead>
            <tr>
                <th>Plate Number</th>
                <th>Type</th>
                <th>Start Date/Time</th>
                <th>Days</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="car-table-body">
            </tbody>
        </table>
    </section>

    <!-- My Reservations -->
    <section>
        <h2>My Reservations</h2>
        <table>
            <thead>
            <tr>
                <th>Plate Number</th>
                <th>Type</th>
                <th>Start Date/Time</th>
                <th>Days</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="reservation-table-body">
            </tbody>
        </table>
    </section>
</div>

<script>
    let currentUserId = null;
    let carsCache = {};

    function showAlert(message, type) {
        const alert = document.getElementById('alert');
        alert.textContent = message;
        alert.className = 'alert alert-' + type;
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 4000);
    }

    async function loadCurrentUser() {
        const res = await fetch('/api/users/me');
        const user = await res.json();
        currentUserId = user.id;
    }

    async function loadCars() {
        const type = document.getElementById('type').value;
        const url = type ? '/api/cars?type=' + type : '/api/cars';
        const res = await fetch(url);
        const cars = await res.json();

        cars.forEach(c => carsCache[c.id] = c);

        const tbody = document.getElementById('car-table-body');
        if (cars.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">No cars found.</td></tr>';
            return;
        }
        tbody.innerHTML = cars.map(car => `
            <tr>
                <td>${car.plateNumber}</td>
                <td>${car.carType}</td>
                <td><input type="datetime-local" id="start-${car.id}" required></td>
                <td><input type="number" id="days-${car.id}" min="1" max="30" value="1" required class="days-input"></td>
                <td><button class="btn-reserve" onclick="reserveCar(${car.id})">Reserve</button></td>
            </tr>
        `).join('');
    }

    async function loadReservations() {
        const res = await fetch('/api/reservations?userId=' + currentUserId);
        const reservations = await res.json();

        // Load car details for reservations not in cache
        for (const r of reservations) {
            if (!carsCache[r.carId]) {
                const carRes = await fetch('/api/cars/' + r.carId);
                if (carRes.ok) carsCache[r.carId] = await carRes.json();
            }
        }

        const tbody = document.getElementById('reservation-table-body');
        if (reservations.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">No reservations yet.</td></tr>';
            return;
        }
        tbody.innerHTML = reservations.map(r => {
            const car = carsCache[r.carId] || {};
            const dt = new Date(r.startDateTime);
            const formatted = dt.toLocaleString('en-GB', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
            return `
                <tr>
                    <td>${car.plateNumber || '-'}</td>
                    <td>${car.carType || '-'}</td>
                    <td>${formatted}</td>
                    <td>${r.days}</td>
                    <td><button class="btn-delete" onclick="deleteReservation(${r.id})">Delete</button></td>
                </tr>
            `;
        }).join('');
    }

    async function reserveCar(carId) {
        const startDateTime = document.getElementById('start-' + carId).value;
        const days = document.getElementById('days-' + carId).value;

        if (!startDateTime || !days) {
            showAlert('Please fill in date and days.', 'error');
            return;
        }

        const res = await fetch('/api/reservations', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userId: currentUserId,
                carId: carId,
                startDateTime: startDateTime,
                days: parseInt(days)
            })
        });

        if (res.ok) {
            showAlert('Car reserved successfully!', 'success');
            await loadReservations();
        } else {
            const err = await res.json();
            showAlert(err.error || 'Reservation failed.', 'error');
        }
    }

    async function deleteReservation(id) {
        const res = await fetch('/api/reservations/' + id, {method: 'DELETE'});

        if (res.ok) {
            showAlert('Reservation deleted.', 'success');
            await loadReservations();
        } else {
            const err = await res.json();
            showAlert(err.error || 'Delete failed.', 'error');
        }
    }

    document.getElementById('type').addEventListener('change', loadCars);

    (async () => {
        await loadCurrentUser();
        await loadCars();
        await loadReservations();
    })();
</script>
</body>
</html>
